name: Workflow to deploy ML backend to development environment

on:
  push:
    branches:
      - "development"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitLab registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: gitlab-ci-token
          password: ${{ secrets.GITLAB_TOKEN }}
      
      - name: Build and push image to registry 
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            registry.gitlab.com/r0hi77_node/mlbackend:latest
            registry.gitlab.com/r0hi77_node/mlbackend:${{github.sha}}
          platforms: linux/amd64
          cache-from: type=registry,ref=registry.gitlab.com/r0hi77_node/mlbackend:latest
          cache-to: type=inline

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DOCKER_COMPOSE_FILE: docker-compose.yml
      
    steps:
      - name: Copy docker compose script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEV_HOST }}
          username: ${{ vars.DEV_USER }}
          key: ${{ secrets.DEV_HOST_PRIVATE_KEY }}
          port: 22
          source: ${{env.DOCKER_COMPOSE_FILE}}
          target: /home/ubuntu

      - name: Start server on host
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DEV_HOST }}
          username: ${{ vars.DEV_USER }}
          key: ${{ secrets.DEV_HOST_PRIVATE_KEY }}
          port: 22
          script: |
            docker login -u gitlab-ci-token -p ${{ secrets.GITLAB_TOKEN }} registry.gitlab.com
            docker compose -f /home/ubuntu/${{ env.DOCKER_COMPOSE_FILE }} pull
            docker image prune -f
            docker compose -f /home/ubuntu/${{ env.DOCKER_COMPOSE_FILE }} up -d --force-recreate


