services:
  MLBackend:
    image: pathtoimaage
    container_name: ml-backend
    ports:
      - "5000:5000"
    networks:
      - server_network
    volumes:
      - shared:/var/tmp
      - /var/log/MLBackend:/app/logs
    restart: unless-stopped
    

volumes:
  shared:

networks:
  server_network:
    driver: bridge